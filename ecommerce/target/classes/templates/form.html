<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Produto</title>
</head>
<body>

<h1 th:text="${produto.id} != null ? 'Editar Produto' : 'Novo Produto'"></h1>

<form th:action="${produto.id} != null ? '/atualizar' : '/salvar'" method="post">

    <input type="hidden" name="id" th:value="${produto.id}">

    <label>Nome:</label>
    <input type="text" name="nome" th:value="${produto.nome}" required><br><br>

    <label>Descrição:</label>
    <input type="text" name="descricao" th:value="${produto.descricao}"><br><br>

    <label>Preço:</label>
    <input type="number" step="0.01" name="preco" th:value="${produto.preco}" required><br><br>

    <label>Imagem:</label>

    <input type="text" name="imagem" th:value="${produto.imagem}" placeholder="ps5miranha.jpg" required><br><br>

    <button type="submit">Salvar</button>

</form>

</body>
</html>
